# Full option reference: docs/configuration.md (or the project wiki).

# Window effect
# border_radius / opacity / animations are always on.
# blur and drop shadows are present but disabled by default — flip blur=1 or
# shadows=1 (and the per-class keys below) to opt in. They cost GPU time per
# frame, so leave off unless you want them.

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Backdrop blur (scenefx). Off by default — it shades every translucent
# surface each frame so the cost is real. blur_layer also blurs background
# layer-shell surfaces (panels, wallpapers' transparent overlays).
# blur_optimized = 1 uses the dirty-tile optimizer (cheaper).
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes=1
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# Drop shadow (scenefx). Off by default. shadow_only_floating=1 only paints
# the shadow on floating windows (cheapest useful setting). layer_shadows
# extends shadows to layer-shell surfaces.
shadows=0
shadow_only_floating=1
layer_shadows=0
shadows_size=10
shadows_blur=15.0
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=240
animation_duration_open=200
animation_duration_tag=180
animation_duration_close=150
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Spring physics for window move/resize/tiling (damped harmonic oscillator,
# semi-implicit Euler). Fully interruptible: changing focus or layout mid-flight
# bends the trajectory instead of jumping. Open/close/tag keep the curves above.
# animation_spring: 1 to use spring for geometry, 0 to fall back to curves.
# mass (m), tension/stiffness (k), friction/damping (c). Lower friction = more
# overshoot/bounce; friction is clamped >=1 so it always settles (0% CPU idle).
# Snappy macOS-like default: m=1, k=180, c=22 (slightly underdamped).
animation_spring=1
animation_spring_mass=1.0
animation_spring_tension=180.0
animation_spring_friction=27.0
# Tag (workspace) switch uses its own, faster spring. Higher tension = quicker.
animation_spring_tag_tension=260.0
animation_spring_tag_friction=32.0
# Momentum hand-off: on drag/resize release the pointer's velocity is injected
# into the window's spring, so a flung window keeps its momentum and settles
# naturally instead of snapping flat. _scale multiplies the handed-off speed
# (0 disables the throw feel, 1 = 1:1, up to 3).
animation_momentum=1
animation_momentum_scale=1.0
# Overview enter/exit uses the snappiest spring (Win11 Task-View feel).
animation_spring_overview_tension=340.0
animation_spring_overview_friction=37.0
# Kinetic motion blur: windows fade slightly while moving fast (proportional to
# spring velocity) and snap perfectly crisp once they settle. strength 0..0.9.
animation_motion_blur=0
animation_motion_blur_strength=0.3

# Send xdg suspended to windows on hidden tags. Saves power, but some apps
# (GTK4/Electron) blank or drop their buffer when suspended, which shows as a
# brief white flash when you switch back. Off by default to avoid that.
tag_suspend_hidden=0

# Per-window idle hibernation: send xdg_toplevel.suspended after this many
# seconds with no focus + no idle-inhibitor on the window. Toolkits typically
# pause their render loop on suspended -> background windows drop to ~0% CPU.
# Wakes immediately on focus return; xwayland clients are exempt (no protocol
# support). 0 disables. Recommended: 300 (5 min) on a desktop, 60 on a laptop.
client_hibernate_idle_secs=0

# Built-in clipboard history. Captures every text/plain selection into a
# RAM-only ring (flushed on compositor restart -- nothing persists across
# reboot). The picker is a small popup at the bottom-centre of the focused
# monitor; navigate with Up/Down/PgUp/PgDn/Home/End, Enter to paste, Escape
# to cancel. Default bind: ALT+v (see toggle_clipboard_history below).
#   clipboard_history             : 0/1 master switch.
#   clipboard_history_max_entries : ring size (1..1000).
#   clipboard_history_max_bytes   : bytes per entry; bigger selections are
#                                   dropped before storage (1024..67108864).
clipboard_history=1
clipboard_history_max_entries=100
clipboard_history_max_bytes=1048576

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
# Vertical-scroller top gap override: -1 centers window; >=0 anchors it that
# many px below the top (0 hugs a top bar, removing extra top margin).
scroller_top_gap=-1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30
# Win11-style dim backdrop behind the overview grid (fades in ~130ms).
overview_dim=1
overview_dim_alpha=0.55
# Thicker border on the hovered/selected tile while in overview.
overview_borderpx=6

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# Explicit GPU synchronization (linux-drm-syncobj-v1). Lowers latency and CPU
# wakeups by letting the GPU signal completion instead of blocking. On by
# default; silently falls back to implicit sync when the renderer or backend
# lacks timeline support. Set to 0 to force implicit sync.
syncobj_enable=1

# Force horizontal-RGB subpixel order so clients can do LCD subpixel AA.
# Only enable on standard RGB-stripe LCD panels (wrong on BGR/OLED/rotated).
subpixel_rgb=0

# Late input latching. Defers each render so it finishes just before vblank,
# latching the freshest input -> ~1 frame less input-to-photon latency. Trades
# a small miss-vblank stutter risk for lower latency; raise latency_margin_us
# if you see stutter. latency_margin_us = safety budget reserved before vblank
# (microseconds). Off by default. Bypassed when allow_tearing is on.
late_latch=0
latency_margin_us=2000

# Built-in idle action. After idle_timeout seconds of no input, run idle_action.
# Any input wakes/re-arms it; suspended while a client inhibits idle (video).
# idle_timeout: seconds, 0 disables. idle_action: off | suspend | hibernate.
#   off       -> blank screens (DPMS), wake on input
#   suspend   -> systemctl suspend
#   hibernate -> systemctl hibernate
idle_timeout=300
idle_action=off

# Aggressive on-battery power savings. All only take effect while unplugged;
# the state is re-polled every 10 s and timers re-arm on an AC<->battery flip.
#   idle_timeout_battery : shorter idle_timeout (seconds) on battery.
#                          0 = reuse idle_timeout. e.g. 60 blanks faster.
#   battery_fps          : caps the animation frame rate on battery (1..240).
#                          Lower = fewer GPU wakeups. 60 = no extra cap.
#   battery_timer_slack_ms: widens kernel timer slack on battery so wakeups
#                          coalesce and the CPU reaches deeper C-states.
#                          0 = keep the tight ~50 us default.
idle_timeout_battery=0
battery_fps=60
battery_timer_slack_ms=50

# CPU PM_QOS: pin the CPUs into shallow C-states by holding a low max DMA
# wakeup latency request on /dev/cpu_dma_latency. Cuts IRQ-to-userspace wakeup
# from ~100 us to ~1 us -> steadier input/frame timing at a battery cost.
# Value = microseconds the kernel may impose. -1 = disabled (default).
# Typical values: 0 = lowest latency, 50 = balance. On battery, 1000 us is
# added automatically so deeper sleep stays available. Needs world-writable
# /dev/cpu_dma_latency or CAP_SYS_ADMIN.
cpu_dma_latency_us=-1

# Smooth pre-idle dimming: pre_idle_dim_lead seconds before idle_timeout, spring
# the backlight down to pre_idle_dim_floor %. Any input springs it back
# elastically without triggering the full idle action. Needs brightnessctl.
pre_idle_dim=0
pre_idle_dim_lead=30
pre_idle_dim_floor=10

# Focus-aware QoS. On focus change, the focused app's process group gets
# normal CPU nice + best-effort disk I/O, the one losing focus is demoted to
# focus_qos_bg_nice + idle-class I/O, so a runaway background app cannot lag
# what you are looking at. focus_qos: 0/1. focus_qos_bg_nice: 1..19.
# Demotion works unprivileged; restoring priority needs CAP_SYS_NICE:
#   sudo setcap cap_sys_nice+ep /usr/bin/lemon
focus_qos=0
focus_qos_bg_nice=10

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x444444ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=Alt,space,spawn,rofi -show drun
bind=Alt,Return,spawn,foot

# exit
bind=SUPER,m,quit
bind=ALT,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# clipboard history popup (built-in, RAM-only ring -- wiped on reboot)
bind=ALT,v,toggle_clipboard_history

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0
bind=Ctrl,6,view,6,0
bind=Ctrl,7,view,7,0
bind=Ctrl,8,view,8,0
bind=Ctrl,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Idle Bindings  ->  idlebind=SECONDS,dispatch,args
# Run a dispatch after SECONDS of no keyboard/pointer activity. Fires once per
# idle period; any input re-arms it. Suspended while a client inhibits idle
# (e.g. a fullscreen video player). Add multiple lines for staged actions.
# idlebind=300,spawn,swaylock
# idlebind=600,spawn,systemctl suspend


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
