<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Lemon — Ultra-Fast Wayland Compositor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0f12"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
    <linearGradient id="lemonBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE94A"/>
      <stop offset="1" stop-color="#F2C200"/>
    </linearGradient>
    <linearGradient id="lemonHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFAD1" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFAD1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFE94A"/>
      <stop offset="1" stop-color="#FFB400"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFE94A" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FFE94A" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- Ambient glow behind lemon -->
  <circle cx="240" cy="180" r="240" fill="url(#glow)"/>

  <!-- Lemon body (slightly tilted) -->
  <g transform="translate(240 180) rotate(-22)">
    <ellipse cx="0" cy="0" rx="140" ry="100" fill="url(#lemonBody)"/>
    <!-- Tips -->
    <path d="M -150 0 q -25 -8 -36 0 q 25 8 36 0 z" fill="#F2C200"/>
    <path d="M 150 0 q 25 -8 36 0 q -25 8 -36 0 z" fill="#F2C200"/>
    <!-- Stem + leaf -->
    <g transform="translate(135 -60) rotate(20)">
      <rect x="-2" y="-22" width="4" height="22" fill="#6E4A1A"/>
      <path d="M 0 -22 q 32 -8 56 14 q -42 8 -56 -14 z" fill="#3CA055"/>
      <path d="M 6 -18 q 22 4 38 22" stroke="#1F6F3A" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Highlight -->
    <ellipse cx="-44" cy="-44" rx="60" ry="22" fill="url(#lemonHighlight)"/>
    <!-- Pore dots -->
    <g fill="#D9A700" opacity="0.55">
      <circle cx="-80" cy="20" r="2"/>
      <circle cx="-50" cy="42" r="2"/>
      <circle cx="-10" cy="50" r="2"/>
      <circle cx="40" cy="38" r="2"/>
      <circle cx="80" cy="14" r="2"/>
      <circle cx="-70" cy="-10" r="2"/>
      <circle cx="20" cy="-12" r="2"/>
      <circle cx="60" cy="-30" r="2"/>
    </g>
  </g>

  <!-- Title -->
  <g transform="translate(520 0)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif">
    <text x="0" y="170" font-size="156" font-weight="800" letter-spacing="-6" fill="url(#title)">lemon</text>
    <text x="0" y="225" font-size="26" font-weight="600" fill="#E6E6EA" letter-spacing="2">ULTRA-FAST&#160;&#160;&#183;&#160;&#160;ULTRA-SMOOTH&#160;&#160;&#183;&#160;&#160;ULTRA-LIGHT</text>
    <text x="0" y="270" font-size="20" font-weight="400" fill="#9A9AA3">A Wayland tiling compositor tuned for low latency &amp; long battery life</text>

    <!-- chips -->
    <g transform="translate(0 295)" font-size="14" font-weight="600">
      <g>
        <rect x="0" y="0" rx="14" ry="14" width="118" height="28" fill="#1c1f26" stroke="#FFE94A" stroke-opacity="0.45"/>
        <text x="59" y="19" text-anchor="middle" fill="#FFE94A">wlroots&#160;0.19</text>
      </g>
      <g transform="translate(130 0)">
        <rect x="0" y="0" rx="14" ry="14" width="84" height="28" fill="#1c1f26" stroke="#FFE94A" stroke-opacity="0.45"/>
        <text x="42" y="19" text-anchor="middle" fill="#FFE94A">Vulkan</text>
      </g>
      <g transform="translate(226 0)">
        <rect x="0" y="0" rx="14" ry="14" width="98" height="28" fill="#1c1f26" stroke="#FFE94A" stroke-opacity="0.45"/>
        <text x="49" y="19" text-anchor="middle" fill="#FFE94A">SCHED_RR</text>
      </g>
      <g transform="translate(336 0)">
        <rect x="0" y="0" rx="14" ry="14" width="76" height="28" fill="#1c1f26" stroke="#FFE94A" stroke-opacity="0.45"/>
        <text x="38" y="19" text-anchor="middle" fill="#FFE94A">PGO</text>
      </g>
      <g transform="translate(424 0)">
        <rect x="0" y="0" rx="14" ry="14" width="98" height="28" fill="#1c1f26" stroke="#FFE94A" stroke-opacity="0.45"/>
        <text x="49" y="19" text-anchor="middle" fill="#FFE94A">XWayland</text>
      </g>
    </g>
  </g>

  <!-- Subtle frame -->
  <rect x="0.5" y="0.5" width="1199" height="359" fill="none" stroke="#FFE94A" stroke-opacity="0.08"/>
</svg>
